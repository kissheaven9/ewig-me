<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ewig.me — Digitale Gedenkseite erstellen</title>
  <meta name="description" content="ewig.me — erstelle eine würdige digitale Gedenkseite mit Fotos, Biografie, Karte und QR-Code. Kostenlos starten.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Bebas+Neue&family=Russo+One&family=Montez&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css?v=13">
</head>
<body>

  <!-- ==================== HEADER ==================== -->
  <header class="header">
    <div class="container header__row">
      <a href="#/" class="brand" data-route="/"><img src="assets/img/logo-wordmark.png" alt="ewig.me" class="brand__badge"></a>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg>
        <input type="text" data-i18n-ph="search.placeholder" placeholder="Seite suchen">
      </div>
      <a href="#/" class="header__link" data-route="/video" data-i18n="nav.video">Videoanleitung</a>
      <div class="header__actions">
        <div class="lang" id="langSwitch"><button data-lang="de" class="is-active">DE</button><button data-lang="ru">RU</button></div>
        <button class="btn btn--primary" data-route="/create">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
          <span data-i18n="cta.create">Seite erstellen</span>
        </button>
        <button class="icon-btn" data-route="/telegram" aria-label="Telegram"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.9 4.3l-3.1 14.7c-.2 1-.9 1.3-1.7.8l-4.7-3.5-2.3 2.2c-.3.3-.5.5-1 .5l.3-4.9L18 6.2c.4-.3-.1-.5-.6-.2L6.9 12.6l-4.6-1.4c-1-.3-1-1 .2-1.5l18-6.9c.8-.3 1.6.2 1.4 1.5z"/></svg></button>
        <button class="icon-btn" data-route="/cabinet" aria-label="Profil"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M5 21c0-4 3.5-6 7-6s7 2 7 6"/></svg></button>
        <button class="burger" id="burger" aria-label="Menü"><span></span></button>
      </div>
    </div>
  </header>

  <main id="screen-home" class="screen is-active">

    <!-- HERO -->
    <section class="hero">
      <div class="container hero__grid">
        <div class="reveal">
          <h1 class="hero__title" data-i18n="hero.title"></h1>
          <p class="hero__lead" data-i18n="hero.lead"></p>
          <div class="hero__counter">
            <div class="avatars" id="heroAvatars"></div>
            <div class="counter__num">1203</div>
            <div class="counter__label" data-i18n="hero.counterLabel"></div>
          </div>
          <p class="hero__note" data-i18n="hero.note"></p>
          <div class="hero__cta">
            <button class="btn btn--primary" data-route="/create">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
              <span data-i18n="cta.createHero">jetzt Erinnerungsseite anlegen</span>
            </button>
            <a class="link-arrow" href="#/" data-route="/create"><span data-i18n="cta.free">Kostenlos starten</span><svg viewBox="0 0 8 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
          </div>
        </div>
        <div class="hero__visual reveal"></div>
      </div>
    </section>

    <!-- ERINNERUNGSSEITEN band -->
    <section class="section" style="padding-top:0">
      <div class="container">
        <div class="eb reveal">
          <div class="eb__title" data-i18n="hero.cardTitle">Erinnerungsseiten</div>
          <p class="eb__text" data-i18n="hero.cardText"></p>
        </div>
      </div>
    </section>

    <!-- EXAMPLES -->
    <section class="section" id="examples">
      <div class="container">
        <button class="btn-refresh sec-refresh reveal" id="examplesRefresh">
          <span class="btn-refresh__ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7M21 4v4h-4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="btn-refresh__txt" data-i18n="examples.refresh">Aktualisieren</span>
        </button>
        <div class="cards3" id="examplesGrid"></div>
      </div>
    </section>

    <!-- FEATURES: WAS KANNST DU -->
    <section class="section band" id="keep">
      <div class="container">
        <div class="feat-head reveal">
          <h2 class="h-section" data-i18n="keep.title"></h2>
          <p data-i18n="keep.lead"></p>
        </div>
        <div class="feats reveal" id="featuresGrid"></div>
      </div>
    </section>

    <!-- TEASER -->
    <section class="section" id="teaser">
      <div class="container">
        <div class="teaser reveal" id="teaserCard"></div>
      </div>
    </section>

    <!-- HOW IT WORKS -->
    <section class="section" id="how">
      <div class="container">
        <h2 class="h-section reveal" data-i18n="how.title"></h2>
        <div class="steps reveal" id="stepsGrid"></div>
        <div class="how-cta reveal">
          <button class="btn btn--primary" data-route="/create"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg><span data-i18n="cta.create">Seite erstellen</span></button>
        </div>
      </div>
    </section>

    <!-- SHARE -->
    <section class="section" id="share">
      <div class="container">
        <div class="share-band reveal">
          <h2 class="h-section" data-i18n="share.title"></h2>
          <div class="share-band__fp"><img src="assets/img/fingerprint.png" alt=""></div>
          <button class="btn btn--primary" data-route="/create"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg><span data-i18n="cta.create">Seite erstellen</span></button>
        </div>
        <div class="share-items reveal" id="shareGrid"></div>
      </div>
    </section>

    <!-- PLANS -->
    <section class="section" id="plans">
      <div class="container">
        <div class="plans reveal" id="plansGrid"></div>
      </div>
    </section>

    <!-- ARTICLES -->
    <section class="section" id="articles">
      <div class="container">
        <h2 class="h-section reveal" data-i18n="articles.title" style="margin-bottom:30px"></h2>
        <div class="cards4 reveal" id="articlesGrid"></div>
      </div>
    </section>

    <!-- FAQ -->
    <section class="section band" id="faq">
      <div class="container">
        <div class="faq-grid reveal">
          <h2 class="h-section" data-i18n="faq.title"></h2>
          <div id="faqList"></div>
        </div>
      </div>
    </section>

    <!-- PRESS -->
    <section class="section" id="press">
      <div class="container">
        <h2 class="h-section reveal" data-i18n="press.title" style="margin-bottom:30px"></h2>
        <div class="cards4 reveal" id="pressGrid"></div>
      </div>
    </section>

    <!-- STORIES -->
    <section class="section" id="stories">
      <div class="container">
        <div class="stories-head reveal">
          <h2 class="h-section" data-i18n="stories.title"></h2>
          <button class="btn-refresh btn-refresh--muted" id="storiesRefresh">
            <span class="btn-refresh__ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7M21 4v4h-4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
            <span class="btn-refresh__txt" data-i18n="stories.more">Weitere Geschichten zeigen</span>
          </button>
        </div>
        <div class="cards3 reveal" id="storiesGrid"></div>
      </div>
    </section>
  </main>

  <!-- SUB-SCREENS (рендерятся из app.js) -->
  <main id="screen-page" class="screen"></main>
  <main id="screen-create" class="screen"></main>
  <main id="screen-editor" class="screen"></main>
  <main id="screen-ai" class="screen"></main>
  <main id="screen-cabinet" class="screen"></main>
  <main id="screen-plaque" class="screen"></main>
  <main id="screen-checkout" class="screen"></main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer__grid">
        <img src="assets/img/logo-wordmark.png" alt="ewig.me" class="footer__badge">
        <div class="footer__links">
          <a href="#plans" data-i18n="footer.prices">Preise</a>
          <a href="#examples" data-i18n="footer.examples">Beispielseiten</a>
          <a href="#/" data-route="/cabinet" data-i18n="footer.cabinet">Mein Konto</a>
          <a href="#keep" data-i18n="footer.benefits">Vorteile</a>
        </div>
        <div class="footer__support">
          <h4 data-i18n="footer.supportTitle">Support</h4>
          <p data-i18n="footer.supportText"></p>
          <button class="btn btn--primary" id="btnSupport"><span data-i18n="footer.write">Schreiben Sie uns</span></button>
        </div>
      </div>
    </div>
    <div class="footer__fp"><img src="assets/img/fingerprint.png" alt=""></div>
  </footer>

  <div class="mobile-nav" id="mobileNav">
    <div class="modal__overlay" data-close-mnav></div>
    <div class="mobile-nav__panel">
      <a href="#examples" data-i18n="nav.examples">Beispiele</a>
      <a href="#how" data-i18n="nav.how">So funktioniert’s</a>
      <a href="#plans" data-i18n="nav.prices">Preise</a>
      <a href="#faq" data-i18n="nav.faq">FAQ</a>
      <a href="#press" data-i18n="nav.about">Über uns</a>
      <button class="btn btn--primary btn--block" style="margin-top:20px" data-route="/create"><span data-i18n="cta.create">Seite erstellen</span></button>
    </div>
  </div>

  <div class="modal" id="modal"><div class="modal__overlay" data-close-modal></div><div class="modal__dialog" id="modalDialog"></div></div>
  <div class="toast-wrap" id="toastWrap"></div>

  <script src="assets/js/qrcode.js"></script>
  <script src="assets/js/i18n.js?v=12"></script>
  <script src="assets/js/data.js?v=12"></script>
  <script src="assets/js/people.js?v=12"></script>
  <script src="assets/js/app.js?v=13"></script>
</body>
</html>
